[General]
network = dragonflyplus
sim-time-limit =5ms
debug-on-errors = true
print-undisposed = false
**.vector-recording = false
repeat = 10
#total-stack = 64MiB
seed-set = 1

# topology
**.numOfNode = 64
**.numOfGroups = 8
**.switchInPod = 4
**.numOfSwitch = 32 #(switchInPod) * (numOfGroups)
**.numOfPortsInLeaf = 6 #switchInPod + numOfNode / numOfGroups / switchInPod
**.numOfPortsInSpine = 7 #numOfPortsInLeaf + 1
**.numOfMEMS = 8 #numOfNode / numOfGroups 
**.gobalLinks = 2 #numOfPortsInSpine - controlPort - 1

**.controlPort = 4 # spine
**.repetition = ${repetition}



**.ODataRate = 100Gbps
**.EDataRate = 40Gbps


**.blinkInterval = 0.0053
**.blinkDuration = 0.00014
**.blinkDistribution=1

**.bigOrSmall = false 
**.rTopo = true 
**.heuristicAlgorithm = 0 # 0 ML	1 KM	2 Edmond


**.flitByteLength = 64 # flit byte
**.msgLength = 16384 #256flits

**.stepLength = 200000 


**.T_night = 0.00005

**.T_nightInMEMS = 0.0001
**.allocateInterval = 0.0001
**.numOfSamples = 1

**.flowPattern = 3

**.messageinterval_us = 32.768 / (${repetition} +1)
**.dealDelay = 0.000000064 

#Change to the local path
**.trafficFile = "../omnetCode/simulations/dataset/lulesh.csv"

**.socketPort = 8889 
**.socketPort_logic = 8878 


